services:
  # Optional local MongoDB (not used when MONGO_URL points to Atlas)
  mongodb:
    image: mongo:7.0
    container_name: tour-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - tour-network

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: dockerfile
    container_name: tour-api-gateway
    ports:
      - "4000:4000"
    depends_on:
      - auth-service
      - users-service
      - tours-service
      - bookings-service
      - reviews-service
      - blog-service
      - chat-service
    environment:
      PORT: 4000
      AUTH_SERVICE_URL: http://auth-service:3002
      USERS_SERVICE_URL: http://users-service:3001
      TOURS_SERVICE_URL: http://tours-service:3003
      BOOKINGS_SERVICE_URL: http://bookings-service:3004
      REVIEWS_SERVICE_URL: http://reviews-service:3005
      BLOG_SERVICE_URL: http://blog-service:3006
      CHAT_SERVICE_URL: http://chat-service:3007
    networks:
      - tour-network

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: dockerfile
    container_name: tour-auth-service
    ports:
      - "3002:3002"
    depends_on:
      - users-service
    environment:
      PORT: 3002
      USERS_SERVICE_URL: http://users-service:3001
      JWT_SECRET: lght
    networks:
      - tour-network

  users-service:
    build:
      context: ./services/users-service
      dockerfile: dockerfile
    container_name: tour-users-service
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      MONGO_URL: ${MONGO_ATLAS_URI:-mongodb+srv://lethien:110676@travelweb.zdjmwom.mongodb.net}/tour_users?appName=travelweb
      JWT_SECRET: lght
    networks:
      - tour-network

  tours-service:
    build:
      context: ./services/tours-service
      dockerfile: dockerfile
    container_name: tour-tours-service
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      MONGO_URL: ${MONGO_ATLAS_URI:-mongodb+srv://lethien:110676@travelweb.zdjmwom.mongodb.net}/tour_tours?appName=travelweb
    networks:
      - tour-network

  bookings-service:
    build:
      context: ./services/bookings-service
      dockerfile: dockerfile
    container_name: tour-bookings-service
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      MONGO_URL: ${MONGO_ATLAS_URI:-mongodb+srv://lethien:110676@travelweb.zdjmwom.mongodb.net}/tour_bookings?appName=travelweb
    networks:
      - tour-network

  reviews-service:
    build:
      context: ./services/reviews-service
      dockerfile: dockerfile
    container_name: tour-reviews-service
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
      MONGO_URL: ${MONGO_ATLAS_URI:-mongodb+srv://lethien:110676@travelweb.zdjmwom.mongodb.net}/tour_reviews?appName=travelweb
    networks:
      - tour-network

  blog-service:
    build:
      context: ./services/blog-service
      dockerfile: dockerfile
    container_name: tour-blog-service
    ports:
      - "3006:3006"
    environment:
      PORT: 3006
      MONGO_URL: ${MONGO_ATLAS_URI:-mongodb+srv://lethien:110676@travelweb.zdjmwom.mongodb.net}/tour_blog?appName=travelweb
    networks:
      - tour-network

  chat-service:
    build:
      context: ./services/chat-service
      dockerfile: dockerfile
    container_name: tour-chat-service
    ports:
      - "3007:3007"
    environment:
      PORT: 3007
      MONGO_URL: ${MONGO_ATLAS_URI:-mongodb+srv://lethien:110676@travelweb.zdjmwom.mongodb.net}/tour_chat?appName=travelweb
      TOGETHER_API_KEY: ${TOGETHER_API_KEY:-}
      RASA_URL: http://chatbot-server:5005/webhooks/rest/webhook
    networks:
      - tour-network

  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    container_name: tour-frontend
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    networks:
      - tour-network

  chatbot-postgres:
    image: postgres:15
    container_name: tour-chatbot-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: chatbot_user
      POSTGRES_PASSWORD: supersecret
      POSTGRES_DB: chatbot
    volumes:
      - chatbot_pg_data:/var/lib/postgresql/data
    networks:
      - tour-network

  chatbot-qdrant:
    image: qdrant/qdrant:latest
    container_name: tour-chatbot-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - chatbot_qdrant_data:/qdrant/storage
    networks:
      - tour-network

  chatbot-init:
    build:
      context: ./ChatBot
    container_name: tour-chatbot-init
    depends_on:
      - chatbot-postgres
      - chatbot-qdrant
    environment:
      DB_HOST: chatbot-postgres
      DB_NAME: chatbot
      DB_USER: chatbot_user
      DB_PASSWORD: supersecret
      QDRANT_URL: http://chatbot-qdrant:6333
      SEMANTIC_BACKEND: qdrant
      SEMANTIC_MODEL_NAME: keepitreal/vietnamese-sbert
    command: >
      bash -c "
      echo 'Waiting for PostgreSQL...' &&
      sleep 10 &&
      python -c \"from database.db_connection import get_connection; conn = get_connection(); cur = conn.cursor(); cur.execute('SELECT to_regclass(\\'public.destinations\\')'); exists = cur.fetchone()[0] is not None; exit(0 if exists else 1)\" || 
      (python -m database.init_db && python -m database.importData && python -m database.importTour) &&
      python -m scripts.sync_qdrant && python -m scripts.sync_qdrant_tour
      "
    networks:
      - tour-network

  chatbot-actions:
    build:
      context: ./ChatBot
    container_name: tour-chatbot-actions
    depends_on:
      chatbot-init:
        condition: service_completed_successfully
    environment:
      DB_HOST: chatbot-postgres
      DB_NAME: chatbot
      DB_USER: chatbot_user
      DB_PASSWORD: supersecret
      QDRANT_URL: http://chatbot-qdrant:6333
      SEMANTIC_BACKEND: qdrant
      SEMANTIC_MODEL_NAME: keepitreal/vietnamese-sbert
    command: bash -c "cd rasa_bot && rasa run actions"
    networks:
      - tour-network

  chatbot-server:
    build:
      context: ./ChatBot
    container_name: tour-chatbot-server
    depends_on:
      chatbot-init:
        condition: service_completed_successfully
      chatbot-actions:
        condition: service_started
    ports:
      - "5005:5005"
    environment:
      DB_HOST: chatbot-postgres
      DB_NAME: chatbot
      DB_USER: chatbot_user
      DB_PASSWORD: supersecret
      QDRANT_URL: http://chatbot-qdrant:6333
      SEMANTIC_BACKEND: qdrant
      SEMANTIC_MODEL_NAME: keepitreal/vietnamese-sbert
    command: bash -c "cd rasa_bot && rasa run --enable-api --cors '*'"
    networks:
      - tour-network

volumes:
  mongodb_data:
  chatbot_pg_data:
  chatbot_qdrant_data:

networks:
  tour-network:
    driver: bridge
