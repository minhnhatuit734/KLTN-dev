#data/domain.yml
version: "3.1"

intents:
  - affirm
  - deny
  #- mood_great
  #- mood_unhappy
  - test_s3

  - bot_challenge
  - search_travel
  #- search_destination
  #- search_activity
  #- search_price
  #- ask_tour_info           # Yêu cầu tìm tour/khách sạn
  - greet
  - goodbye
  - ask_weather_timing      # Hỏi thời tiết/thời điểm

  - ask_location_feature    # Hỏi đặc điểm/đặc sản vùng
  - book_tour               # Yêu cầu đặt chỗ/mua tour
  - inform                  # Cung cấp thông tin (điểm đến, số người...)
  - out_of_scope            # Các câu hỏi ngoài luồng (nhiễu)

entities:
  - season
  - month
  - month_from
  - month_to
  - time_window

  - departure     # Điểm khởi hành
  - destination   # Điểm đến (Thay cho location cũ)
  - time          # Thời gian
  - activity      # Hoạt động
  - budget        # Ngân sách
  - duration      # Thời lượng
  - party_size    # Số lượng người
  - tour_name     # Tên tour cụ thể
  - category      # Phân biệt ks, biển, nhà hàng

forms:
  travel_form:
    required_slots:
      - destination
      - budget

slots:
  season:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: season

  month:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: month

  month_from:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: month_from

  month_to:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: month_to

  budget:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: budget
        extractor: RegexEntityExtractor

  time_window:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: time_window

  destination:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: destination
        extractor: DIETClassifier

  category:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: category
        extractor: DIETClassifier

  departure:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: departure

  time:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: time

  party_size:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: party_size
        
  tour_name:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: tour_name

  duration:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: duration

actions:
  #- action_search_destination
  - action_log_start
  - validate_travel_form
  - action_search_travel
  - action_ai_consultant
  - action_search_tour_info

responses:
  utter_greet:
    - text: "Chào bạn! Mình là trợ lý du lịch, có thể gợi ý điểm đến theo mùa, ngân sách và sở thích của bạn."

  utter_cheer_up:
    - text: "Đừng lo nhé, mình gợi ý vài điểm đến phù hợp để bạn tham khảo ngay."

  utter_did_that_help:
    - text: "Những gợi ý này có phù hợp với bạn không?"

  utter_happy:
    - text: "Tuyệt vời! Bạn muốn mình lọc tiếp theo tháng, ngân sách hay hoạt động?"

  utter_test_s3:
  - text: "Báo cáo sếp Thịnh, em đang chạy bằng não tải từ S3 về đây ạ!"

  utter_goodbye:
    - text: "Cảm ơn bạn đã sử dụng trợ lý du lịch. Hẹn gặp lại bạn nhé!"

  utter_iamabot:
    - text: "Mình là chatbot tư vấn du lịch, luôn sẵn sàng gợi ý điểm đến phù hợp cho bạn."

  utter_out_of_scope:
    - text: "Mình hiện tập trung tư vấn du lịch (địa điểm, mùa đi, ngân sách). Bạn muốn mình gợi ý chuyến đi nào không?"

  utter_ask_destination:
    - text: "Chuyến đi này bạn dự định ghé thăm tỉnh thành hay địa điểm cụ thể nào?"
    - text: "Tuyệt vời! Bạn đã chọn được điểm đến nào chưa (ví dụ: Sapa, Đà Lạt, vùng biển...)?"

  utter_ask_budget:
    - text: "Để mình lọc tour chuẩn nhất, ngân sách dự kiến của bạn khoảng bao nhiêu (ví dụ: dưới 5 triệu, 3 củ...)?"
    - text: "Tài chính cho chuyến đi này của bạn rơi vào khoảng bao nhiêu tiền?"

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
