# SonarQube Project Configuration
sonar.projectKey=KLTN-microservices
sonar.projectName=KLTN - Microservices Chatbot
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8

# Source directories
sonar.sources=.
sonar.inclusions=**/*.ts,**/*.tsx,**/*.js,**/*.jsx,**/*.py

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/coverage/**,**/.git/**,**/test/**,**/*.spec.ts,**/*.test.ts

# TypeScript/JavaScript
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Python (for future MLOps)
sonar.python.coverage.reportPaths=coverage.xml
